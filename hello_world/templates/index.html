{% load django_browser_reload %}
{% load static %}
{% get_static_prefix as STATIC_PREFIX %}

<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ title }}{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'main.css' %}">
</head>

<body>
    <main>
        <header class="App-header">
            <h1>Catálogo de Legends</h1>
            <p class="small">Todos los personajes juntos. Haz click en uno para ver su ficha.</p>
        </header>

        <section class="catalog">
            <div class="catalog-grid">
                {% for char in characters %}
                <a class="card" href="{% url 'character_detail' slug=char.slug %}">
                    <div class="thumb">
                        <img src="{{ STATIC_PREFIX }}{{ char.image1 }}" alt="{{ char.name }}">
                    </div>
                    <div class="name">{{ char.name }}</div>
                </a>
                {% endfor %}
            </div>
        </section>
    </main>
</body>

</html>
